name: flutter_application_1
description: "App Fuerza de Ventas — Caja Cusco. Asesor de Negocios en Campo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Estado MVVM
  flutter_riverpod: ^2.5.1

  # Backend Supabase
  supabase_flutter: ^2.5.0

  # Base de datos local (offline-first)
  sqflite: ^2.3.3
  path: ^1.9.0

  # Navegación declarativa
  go_router: ^14.0.0

  # Mapas y ubicación
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Cámara y documentos
  camera: ^0.11.0
  image_picker: ^1.1.2
  image: ^4.2.0
  photo_view: ^0.15.0

  # Gráficos
  fl_chart: ^0.68.0

  # Notificaciones locales
  flutter_local_notifications: ^17.2.2
  # Firebase (se activa en Fase 12 — requiere google-services.json)
  # firebase_core: ^3.3.0
  # firebase_messaging: ^15.1.3

  # Firma digital del cliente
  signature: ^5.4.1

  # PDF y exportación
  pdf: ^3.11.1
  printing: ^5.13.2

  # Utilidades
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  # workmanager: ^0.5.2  # Se activa en Fase 15 — sync nocturna (requiere versión compatible con Flutter actual)
  flutter_secure_storage: ^9.2.2
  uuid: ^4.4.2

  # UI y branding Caja Cusco
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_map: ^8.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/images/
